# JAVEdit Metrics path config

# SyncNet (LatentSync). Face detection + 106-point landmarks use the
# insightface buffalo_l pack (det_10g + 2d106det); models are auto-downloaded
# by insightface under <model_root>/models/buffalo_l/.
syncnet:
  config_path: third_party/lipsync/configs.yaml
  model_root: ../../../models/insightface

# VTSS
vtss:
  checkpoint: ../../../../../../Koala-36M/Training_Suitability_Assessment/infer.pth
  config: third_party/vtss/test.yml

# UTMOSv2
utmos:
  config_name: fusion_stage3

# Qwen3-Omni VLM Judge (av_quality / instruction_compliance / video_fidelity)
qwen_judge:
  model_path: ../../../../../../Qwen/Qwen3-Omni-30B-A3B-Thinking
  tensor_parallel_size: 4
  pipeline_parallel_size: 2
  batch_size: 8

# Benchmark CSV
benchmark:
  csv_path: ../../../benchmark_150.csv
